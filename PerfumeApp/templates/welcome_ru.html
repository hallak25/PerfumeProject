{% extends 'base.html' %}
{% load static %}

{% block navbar %}
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="#">
            <i class="fas fa-spray-can-sparkles me-2"></i>Luxury Fragrances
        </a>
    </div>
</nav>
{% endblock %}

{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h1 class="display-4 fw-bold mb-4">Welcome to Exquisite Scents</h1>
            <img src="{% static 'images/welcome.jpg' %}" alt="Luxury Perfumes"
                 class="img-fluid rounded shadow-lg mb-4"
                 style="max-height: 400px; width: 100%; object-fit: cover;">
            <p class="lead text-muted mb-4">Discover our collection of rare and luxurious fragrances</p>
            <a href="{% url 'catalog_ru' %}" class="btn btn-primary btn-lg px-5 py-3">Start Browsing</a>
        </div>
    </div>
</div>
{% endblock %}
