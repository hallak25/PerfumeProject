{% extends 'base_index.html' %}
{% load static %}

{% block title %}New Purchase{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header">
                    <h4 class="mb-0 text-white">New Perfume Purchase</h4>
                </div>
                <div class="card-body p-4">
                    <div id="message" class="d-none mb-3"></div>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Perfumer</label>
                            <select id="perfumer" class="form-select"></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Fragrance</label>
                            <select id="fragrance" class="form-select"></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Origin</label>
                            <select id="origin" class="form-select"></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Location</label>
                            <select id="location" class="form-select"></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Bottle</label>
                            <input type="text" id="bottle" list="bottleList" class="form-control">
                            <datalist id="bottleList"></datalist>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Description</label>
                            <input type="text" id="package" list="packageList" class="form-control">
                            <datalist id="packageList"></datalist>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Price</label>
                            <input type="number" id="price" step="0.01" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Currency</label>
                            <select id="currency" class="form-select"></select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Purchase Date</label>
                            <input type="date" id="date" class="form-control">
                        </div>
                        <div class="col-12">
                            <button id="purchaseBtn" class="btn btn-primary w-100 py-2">Purchase</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="{% static 'js/add_transaction.js' %}"></script>
{% endblock %}
