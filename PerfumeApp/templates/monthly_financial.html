<!DOCTYPE html>
{% load static %}
<html>
<head>
    <title>Monthly Financial Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 95%;
            margin: 0 auto;
        }
        .banner {
            background: #0d6efd;
            padding: 14px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 24px;
        }

        select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            min-width: 300px;
            background: white;
        }
        .list {
            background: white;
            padding: 0;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            overflow: hidden;
        }
        .list h2 {
            background-color: #0d6efd;
            color: white;
            margin: 0;
            padding: 14px 20px;
            font-size: 1.2rem;
            font-weight: 600;
        }
        .list > div {
            padding: 15px 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }
        th {
            background: #f8f9fa;
            font-weight: 600;
        }
        .summary {
            margin-top: 20px;
            padding-top: 10px;
            border-top: 2px solid #f0f0f0;
            font-weight: 600;
        }

         .btn-light {
            background-color: #fff;
            border: 1px solid #dee2e6;
            color: #000;
            padding: 0.375rem 0.75rem;
            border-radius: 0.25rem;
            text-decoration: none;
        }
    .btn-light:hover {
        background-color: #e9ecef;
        border-color: #dee2e6;
            yearMonth {
        color: #000;
        background-color: #fff;
    }
    </style>
</head>
<body>
    <div class="banner">
        <a href="{% url 'index' %}" style="position:absolute; left:16px; background:#fff; color:#333; padding:5px 14px; border:1px solid #ccc; border-radius:4px; text-decoration:none; font-size:0.875rem;"><i class="fas fa-home" style="margin-right:4px;"></i>Home</a>
        <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
            <span style="color:#fff; font-weight:600; font-size:1.1rem; letter-spacing:0.02em;"><i class="fas fa-calendar-alt" style="margin-right:6px;"></i>Monthly Report</span>
            <select id="yearMonth" style="width:200px; padding:6px 10px; border:1px solid #ddd; border-radius:5px; font-size:14px; background:white;">
                <option value="">Select Month</option>
                {% for ym in year_months %}
                    <option value="{{ ym }}">{{ ym }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
    <div class="container-fluid" style="padding: 0 20px;">

        <div class="list">
            <h2>Monthly Purchases</h2>
            <div id="purchases-list"></div>
            <div id="purchases-summary" class="summary"></div>
        </div>

        <div class="list">
            <h2>Monthly Sales</h2>
            <div id="sales-list"></div>
            <div id="sales-summary" class="summary"></div>
        </div>
    </div>
    <script src="{% static 'js/monthly_financial.js' %}"></script>
</body>
</html>
